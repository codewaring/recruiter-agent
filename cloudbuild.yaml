substitutions:
  _SERVICE_NAME: recruiter-agent
  _REGION: asia-southeast1
  _SOURCE_API_BASE_URL: https://jd-agent-gcp-4hhkyhyofa-as.a.run.app

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA

  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8090
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_GENAI_USE_VERTEXAI=true,MODEL_NAME=gemini-2.5-pro,SOURCE_API_BASE_URL=${_SOURCE_API_BASE_URL}

images:
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
